<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | DarkSleek</title>
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ========== GLOBAL SETTINGS ========== */
        :root {
            --primary: #00d4ff;
            --secondary: #7000ff;
            --accent: #ff2e7e;
            --bg-dark: #0a0c10;
            --glass-bg: rgba(17, 19, 23, 0.7);
            --glass-border: rgba(0, 212, 255, 0.2);
            --text-main: #eef2ff;
            --text-dim: #8a99b4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ========== ANIMATED BACKGROUND ========== */
        .animated-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #10141d, #0a0c10);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: floatOrb 20s infinite alternate ease-in-out;
        }

        .orb-1 { width: 500px; height: 500px; background: var(--primary); top: -10%; left: -10%; }
        .orb-2 { width: 600px; height: 600px; background: var(--accent); bottom: -10%; right: -10%; animation-delay: -5s; }
        .orb-3 { width: 400px; height: 400px; background: var(--secondary); top: 30%; left: 50%; animation-delay: -2s; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(60px, -40px) scale(1.1); opacity: 0.5; }
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
        }

        /* ========== SIGN UP CARD ========== */
        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            z-index: 10;
        }

        .form-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 35px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: 0.4s ease;
        }

        .form-card:hover {
            border-color: var(--primary);
            box-shadow: 0 30px 60px rgba(0, 212, 255, 0.15);
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            text-decoration: none;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            width: 50px; height: 50px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.4rem;
            box-shadow: 0 0 20px rgba(0,212,255,0.4);
        }

        .logo-text {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-dim);
            margin-bottom: 25px;
            font-size: 0.85rem;
        }

        /* Input Fields */
        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            padding: 14px 15px 14px 55px;
            border-radius: 15px;
            color: white;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.5);
        }

        /* Checkbox */
        .terms {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 25px;
            font-size: 0.8rem;
            color: var(--text-dim);
            cursor: pointer;
        }

        .terms input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            margin-top: 2px;
        }

        .terms a { color: var(--primary); text-decoration: none; }

        /* Button */
        .btn-signup {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 14px;
            border-radius: 50px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-signup:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,212,255,0.4);
        }

        .footer-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="animated-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="container">
        <div class="form-card">
            <a href="index.html" class="logo-area">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                <div class="logo-text">DarkSleek</div>
            </a>

            <h2>Create Account</h2>
            <p class="subtitle">Join the next generation of tech talent</p>


            <form action="/Su" method="post">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Full Name" id="fname" name="fname" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email address" id="em" name="em" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Create Password" id="p" name="p" required>
                </div>

                <button type="submit" class="btn-signup">
                    Get Started ✨
                </button>
            </form>

            <div class="footer-link">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

</body>
</html>
