<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DarkSleek Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ========== THEME VARIABLES ========== */
        :root {
            --primary: #00d4ff;
            --secondary: #7000ff;
            --accent: #ff2e7e;
            --bg-dark: #0a0c10;
            --glass-card: rgba(17, 19, 23, 0.8);
            --glass-border: rgba(0, 212, 255, 0.2);
            --text-main: #eef2ff;
            --text-dim: #8a99b4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ========== BACKGROUND ANIMATION ========== */
        .background-wrapper {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #11141d 0%, #0a0c10 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: float 25s infinite alternate ease-in-out;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--primary); top: -10%; left: -5%; }
        .orb-2 { width: 500px; height: 500px; background: var(--secondary); bottom: -15%; right: -5%; animation-delay: -5s; }
        
        @keyframes float {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(40px, 40px) scale(1.1); }
        }

        /* ========== LOGIN CARD ========== */
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            position: relative;
        }

        .login-card {
            background: var(--glass-card);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .logo-box {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            text-decoration: none;
        }

        .logo-square {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: grid;
            place-items: center;
            color: #fff;
            font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .logo-name {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 { font-size: 1.8rem; margin-bottom: 10px; font-weight: 700; }
        .tagline { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 35px; }

        /* Form Styling - Removed Hover/Focus Lighting */
        .input-wrap {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-wrap i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 1rem;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            padding: 15px 15px 15px 50px;
            border-radius: 16px;
            color: white;
            font-size: 0.95rem;
            /* Transition removed to prevent lighting shifts */
            outline: none;
        }

        /* Force input to stay static on focus */
        input:focus {
            border-color: var(--glass-border);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: none;
        }

        .extra-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.85rem;
        }

        .remember { display: flex; align-items: center; gap: 8px; color: var(--text-dim); cursor: pointer; }
        .remember input { width: auto; accent-color: var(--primary); }

        .forgot { color: var(--primary); text-decoration: none; font-weight: 500; }
        .forgot:hover { text-decoration: underline; }

        /* Button */
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 16px;
            border-radius: 50px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.2);
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.4);
        }

        .signup-footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .signup-footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="background-wrapper">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <a href="index.html" class="logo-box">
                <div class="logo-square"><i class="fas fa-bolt"></i></div>
                <div class="logo-name">DarkSleek</div>
            </a>

            <h2>Welcome Back</h2>
            <p class="tagline">Sign in to manage your applications</p>

           <form action="/login" method="post">
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email Address" id="em" name="em" required>
                </div>

                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password" id="p" name="p" required>
                </div>

                <div class="extra-actions">
                    <a href="#" class="forgot">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login">
                    Sign In <i class="fas fa-chevron-right"></i>
                </button>
            </form>

            <div class="signup-footer">
                New to the platform? <a href="/signup">Create Account</a>
            </div>
        </div>
    </div>

</body>
</html>
